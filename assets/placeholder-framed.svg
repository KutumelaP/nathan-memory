<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0c10"/>
      <stop offset="1" stop-color="#151926"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9a86a" stop-opacity=".85"/>
      <stop offset=".6" stop-color="#c9a86a" stop-opacity=".25"/>
      <stop offset="1" stop-color="#c9a86a" stop-opacity=".75"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1100" fill="url(#bg)"/>
  <rect x="90" y="90" width="1420" height="920" rx="48" fill="none" stroke="url(#gold)" stroke-width="6"/>
  <rect x="130" y="130" width="1340" height="840" rx="36" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.10)" stroke-width="2"/>
  <g fill="#ececf2" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="800" y="520" font-size="44" font-weight="700">Add your framed photo</text>
    <text x="800" y="585" font-size="22" fill="#b9bcc7">Replace <tspan fill="#c9a86a">assets/framed-photo.jpg</tspan> and re-upload</text>
  </g>
  <g opacity=".25">
    <circle cx="220" cy="220" r="110" fill="#c9a86a"/>
    <circle cx="1440" cy="940" r="150" fill="#7055c3"/>
  </g>
</svg>

